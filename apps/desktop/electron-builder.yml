appId: com.modaurbana.app
productName: Moda Urbana
directories:
  output: release
files:
  - dist/**/*
  - package.json
extraResources:
  - from: ../web/dist
    to: web-dist
    filter:
      - '**/*'
win:
  target: nsis
  icon: resources/icon.png
  signAndEditExecutable: false
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
